<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VocaSpot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="vs-popup">

    <header class="vs-header">
      <img src="../icons/icon-48.png" alt="" class="vs-logo" />
      <span class="vs-app-name">VocaSpot</span>
    </header>

    <section class="vs-section">
      <span class="vs-label">Highlight words at level</span>
      <div class="vs-cefr-buttons">
        <button class="vs-cefr-btn" data-level="A1">A1</button>
        <button class="vs-cefr-btn" data-level="A2">A2</button>
        <button class="vs-cefr-btn" data-level="B1">B1</button>
        <button class="vs-cefr-btn" data-level="B2">B2</button>
        <button class="vs-cefr-btn" data-level="C1">C1</button>
        <button class="vs-cefr-btn" data-level="C2">C2</button>
      </div>
      <p class="vs-cefr-desc" id="cefr-desc"></p>
    </section>

    <section class="vs-section">
      <span class="vs-label">Highlight style</span>
      <div class="vs-style-swatches">
        <button class="vs-swatch" data-style="underline-dashed" title="Teal dashed underline">
          <span class="vs-preview vs-preview-dashed">Example</span>
        </button>
        <button class="vs-swatch" data-style="bg-yellow" title="Yellow background">
          <span class="vs-preview vs-preview-bg-yellow">Example</span>
        </button>
        <button class="vs-swatch" data-style="underline-dotted" title="Orange dotted underline">
          <span class="vs-preview vs-preview-dotted">Example</span>
        </button>
      </div>
    </section>

    <section class="vs-section vs-section-row">
      <span class="vs-label vs-label-inline">Enable VocaSpot on this site</span>
      <label class="vs-toggle">
        <input type="checkbox" id="site-toggle" />
        <span class="vs-toggle-track"></span>
      </label>
    </section>

    <footer class="vs-footer">
      <span>VocaSpot v1.0.0</span>
      <a href="https://github.com/grapes-labs/vocaspot/issues" id="report-link" target="_blank" rel="noopener">Report an issue</a>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
